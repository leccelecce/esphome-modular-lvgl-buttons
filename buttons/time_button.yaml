---
# Time display button
# vars:
#    uid:
#    page_id:
#    row:
#    column:
#    row_span:
#    column_span:
#    click_page:

# This section add a button to LVGL page main_page
lvgl:
  pages:
    - id: !extend ${page_id | default("main_page")}
      widgets:
        - container:
            id: ${uid}
            grid_cell_row_pos: ${row}
            grid_cell_column_pos: ${column}
            grid_cell_row_span: ${row_span | default(button_row_span)}
            grid_cell_column_span: ${column_span | default(button_col_span)}
            grid_cell_x_align: stretch
            grid_cell_y_align: stretch
            # outline_width: 1
            # outline_color: red
            widgets:
              - button:
                  id: button_${uid}
                  bg_opa: TRANSP
                  # 👇 stack children vertically
                  layout: vertical
                  align: center # center children vertically

                  widgets:
                    - label:
                        id: time_label1
                        styles: date_style
                        text: 'Monday'
                    - label:
                        id: time_label2
                        styles: date_style
                        text: '01 Jan'
                    - label:
                        id: time_label3
                        styles: time_style
                        text: '12:34'                        
                  on_short_click:
                    then:
                      lvgl.page.show: ${click_page | default(main_page)}

script:
  - id: !extend time_update
    then:
      - lvgl.label.update:
          id: label_${uid}
          text: !lambda 'return id(system_time).now().strftime("%l:%M %P");'
